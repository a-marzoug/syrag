name: Bug report
description: Report reproducible behavior that looks incorrect.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for maintainers to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest code sample, request payload, or repository that reproduces the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SyRAG version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python version
      options:
        - "3.12"
        - "3.13"
        - Other
    validations:
      required: true
  - type: input
    id: extras
    attributes:
      label: Installed extras
      placeholder: "openai,chroma,server"
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: text
