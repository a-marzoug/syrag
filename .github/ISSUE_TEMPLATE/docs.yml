name: Documentation issue
description: Report missing, unclear, or incorrect documentation.
title: "docs: "
labels: ["documentation", "needs-triage"]
body:
  - type: input
    id: page
    attributes:
      label: Page or section
      placeholder: "docs/cookbook/langchain.md"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or example
